<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rapid Rivers Rafting - Contact Us</title>
    <meta name="description"
      content="Contact Rapid Rivers Rafting for questions, comments, and bookings.">
    <meta name="author" content="Roger Camacho Orellana">
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <header>
        <img src="images/logo.png" alt="Rafting Company Logo">
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>

    <main>
        <h1>Contact Rapid Rivers Rafting</h1>

        <div class="contact-grid">
            <section class="contact-info">
                <h2>White Water Rafting Company</h2>
                <p>📍 123 Main River Street<br>Kolob, California</p>
                <p>📞 +1 999 999 9999</p>
                <p>✉️ info@whiteRoger.com</p>

                <iframe
                  src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3022.1422937950147!2d-73.98731968459391!3d40.75889497932681!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x89c25855c6480299%3A0x55194ec5a1ae072e!2sTimes+Square!5e0!3m2!1sen!2sus!4v1510579768150"
                  height="300" allowfullscreen="" loading="lazy"
                  referrerpolicy="no-referrer-when-downgrade">
                </iframe>
            </section>

            <section class="contact-form">
                <h2>Send Us a Message</h2>
                <form action="#" method="get">
                    <div class="form-item">
                        <label for="fullname">Name:</label>
                        <input type="text" id="fullname" name="fullname" placeholder="John Doe"
                          required>
                    </div>

                    <div class="form-item">
                        <label for="useremail">Email:</label>
                        <input type="email" id="useremail" name="useremail"
                          placeholder="john@email.com" required>
                    </div>

                    <fieldset class="form-item">
                        <legend>Message Purpose:</legend>
                        <label for="general">
                            <input type="radio" id="general" name="purpose" value="general" checked>
                            General Inquiry
                        </label>
                        <label for="reservation">
                            <input type="radio" id="reservation" name="purpose" value="reservation">
                            Reservation Question
                        </label>
                        <label for="suggestion">
                            <input type="radio" id="suggestion" name="purpose" value="suggestion">
                            Website Suggestion
                        </label>
                    </fieldset>

                    <div class="form-item">
                        <label for="message">Message:</label>
                        <textarea id="message" name="message" rows="4" placeholder="Type here"
                          required></textarea>
                    </div>

                    <div class="form-item checkbox-container">
                        <label for="subscribe">
                            <input type="checkbox" id="subscribe" name="subscribe" value="yes">
                            Please Subscribe me to the monthly newsletter
                        </label>
                    </div>

                    <button type="submit" class="submit-btn">Get in Touch!</button>
                </form>
            </section>
        </div>

        <section class="employees">
            <h2>We Are Here to Serve You</h2>
            <div class="employee-grid">
                <figure>
                    <img src="images/employee1.jpg" alt="Guide 1">
                    <figcaption>River Guide - Sarah</figcaption>
                </figure>
                <figure>
                    <img src="images/employee2.jpg" alt="Guide 2">
                    <figcaption>Safety Instructor - Mike</figcaption>
                </figure>
                <figure>
                    <img src="images/employee3.jpg" alt="Operations Manager David">
                    <figcaption>Operations Manager - David</figcaption>
                </figure>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Rapid Rivers Rafting. Roger Camacho Orellana.</p>
        <nav class="socialmedia">
            <a href="https://facebook.com">
                <img src="images/facebook.svg" alt="Facebook Icon">
            </a>
            <a href="https://linkedin.com">
                <img src="images/linkedin.svg" alt="LinkedIn Icon">
            </a>
            <a href="https://instagram.com">
                <img src="images/instagram.svg" alt="Instagram Icon">
            </a>
        </nav>
    </footer>
</body>

</html>
